balance_controller:
  ros__parameters:

    # ── Topics ──────────────────────────────────────────────────────────────
    imu_topic:     /segway/imu/filtered   # input: filtered pitch
    odom_topic:    /segway/odom           # input: measured velocity
    joy_topic:     /segway/cmd_vel_joy    # input: joystick setpoint
    cmd_vel_topic: /segway/cmd_vel        # output: motor command

    # ════════════════════════════════════════════════════════════════════════
    # INNER LOOP — pitch balance (100 Hz, IMU-driven)
    # ════════════════════════════════════════════════════════════════════════
    #
    # Kp : too low → falls slowly without recovering
    #      too high → fast oscillations
    kp: 6.0

    # Ki : corrects static pitch bias
    #      too high → windup, instability
    ki: 0.0

    # Kd : damps oscillations
    #      too high → gyro noise amplification
    kd: 0.05

    integral_max: 0.2    # anti-windup

    output_max: 1.5    # max wheel effort (Nm)
    deadband: 0.0      # Nm

    # Safety: emergency stop if pitch exceeds this
    pitch_limit: 1.2     # rad

    # ════════════════════════════════════════════════════════════════════════
    # OUTER LOOP — velocity control (20 Hz, timer-driven)
    # Output: pitch_setpoint fed to inner loop
    # ════════════════════════════════════════════════════════════════════════
    #
    # vel_kp : how aggressively to lean to correct velocity error
    #          too high → oscillation, instability
    #          too low  → slow drift correction
    vel_kp: 0.0

    # vel_ki : corrects steady-state velocity error
    #          keep small to avoid windup
    vel_ki: 0.0

    # vel_kd : damps velocity overshoot
    vel_kd: 0.0

    # Maximum pitch setpoint the outer loop can command (safety)
    pitch_setpoint_max: 0.15   # rad (~8.6 degrees)

    # Anti-windup for velocity integrator
    vel_integral_max: 0.1      # rad

    # ── Debug ────────────────────────────────────────────────────────────────
    publish_debug: true
